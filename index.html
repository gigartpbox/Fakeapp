<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>СберБанк Онлайн</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f2f4f7;
            min-height: 100vh;
            overflow-x: hidden;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        .login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ffffff;
            z-index: 200;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.4s ease;
        }

        .login-screen.hide {
            opacity: 0;
            pointer-events: none;
        }

        .sber-logo {
            margin-bottom: 48px;
        }

        .sber-logo svg {
            width: 72px;
            height: 72px;
        }

        .greeting {
            font-size: 28px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 8px;
        }

        .subtext {
            font-size: 15px;
            color: #8e8e93;
            margin-bottom: 32px;
        }

        .phone-input {
            width: 85%;
            max-width: 320px;
            padding: 16px 20px;
            border: 1px solid #e5e5ea;
            border-radius: 14px;
            font-size: 17px;
            background: #f9f9fb;
            text-align: center;
            margin-bottom: 16px;
        }

        .phone-input:focus {
            outline: none;
            border-color: #2E7D32;
        }

        .next-btn {
            background: #2E7D32;
            color: white;
            border: none;
            border-radius: 14px;
            padding: 16px 32px;
            font-size: 17px;
            font-weight: 600;
            width: 85%;
            max-width: 320px;
            cursor: pointer;
        }

        .next-btn:active {
            background: #1B5E20;
            transform: scale(0.97);
        }

        .password-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 199;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .password-screen.show {
            display: flex;
            animation: fadeIn 0.3s ease-out;
        }

        .password-dots {
            display: flex;
            gap: 20px;
            margin: 32px 0;
        }

        .dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #e5e5ea;
        }

        .dot.filled {
            background: #2E7D32;
        }

        .password-keyboard {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            max-width: 280px;
        }

        .key {
            background: #f9f9fb;
            border: 1px solid #e5e5ea;
            border-radius: 50px;
            padding: 18px;
            font-size: 26px;
            font-weight: 500;
            text-align: center;
            cursor: pointer;
        }

        .key:active {
            background: #e5e5ea;
            transform: scale(0.94);
        }

        .main-app {
            display: none;
            background: #f2f4f7;
            min-height: 100vh;
            padding-bottom: 80px;
        }

        .main-app.show {
            display: block;
            animation: slideUp 0.3s ease-out;
        }

        .main-header {
            background: white;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e5e5ea;
        }

        .user-greeting {
            font-weight: 600;
            font-size: 20px;
            color: #1a1a1a;
        }

        .avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #2E7D32, #1B5E20);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .avatar:active {
            transform: scale(0.94);
        }

        .cards-container {
            padding: 16px;
        }

        .bank-card {
            background: linear-gradient(135deg, #1B5E20, #2E7D32);
            border-radius: 28px;
            padding: 24px;
            color: white;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
        }

        .card-balance {
            font-size: 34px;
            font-weight: 800;
            margin: 12px 0;
        }

        .quick-actions {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            padding: 16px;
            background: white;
            margin: 16px;
            border-radius: 24px;
        }

        .action {
            text-align: center;
            padding: 8px 4px;
        }

        .action:active {
            transform: scale(0.94);
        }

        .action-icon {
            background: #e8f5e9;
            width: 52px;
            height: 52px;
            border-radius: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 8px;
            font-size: 24px;
        }

        .action-label {
            font-size: 11px;
            color: #1a1a1a;
            font-weight: 500;
        }

        .transfer-section {
            background: white;
            margin: 16px;
            border-radius: 24px;
            padding: 20px;
        }

        .section-header {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .transfer-field {
            margin-bottom: 16px;
        }

        .transfer-field label {
            font-size: 13px;
            color: #8e8e93;
            margin-bottom: 6px;
            display: block;
        }

        .transfer-field input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #e5e5ea;
            border-radius: 14px;
            font-size: 16px;
            background: #f9f9fb;
        }

        .transfer-field input:focus {
            outline: none;
            border-color: #2E7D32;
        }

        .hidden-editor {
            position: fixed;
            bottom: 100px;
            left: 16px;
            right: 16px;
            background: white;
            border-radius: 28px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            display: none;
            z-index: 300;
        }

        .hidden-editor.show {
            display: block;
        }

        .hidden-editor h4 {
            margin-bottom: 16px;
            color: #e65100;
        }

        .hidden-editor input {
            width: 100%;
            padding: 14px;
            margin-bottom: 12px;
            border: 1px solid #ddd;
            border-radius: 14px;
        }

        .hidden-editor button {
            width: 100%;
            background: #ff9800;
            border: none;
            padding: 14px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 10px 16px 24px;
            border-top: 1px solid #e5e5ea;
        }

        .nav-item {
            text-align: center;
            font-size: 10px;
            color: #8e8e93;
        }

        .nav-item.active {
            color: #2E7D32;
        }

        .nav-icon {
            font-size: 24px;
            margin-bottom: 4px;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 14px 0;
            border-bottom: 1px solid #f0f0f0;
        }
    </style>
</head>
<body>

<!-- ЭКРАН ВХОДА -->
<div class="login-screen" id="loginScreen">
    <div class="sber-logo">
        <svg viewBox="0 0 100 100" fill="none">
            <circle cx="50" cy="50" r="48" fill="#2E7D32"/>
            <path d="M35 50 L45 60 L65 40" stroke="white" stroke-width="5" fill="none"/>
        </svg>
    </div>
    <div class="greeting">СберБанк</div>
    <div class="subtext">Введите номер телефона</div>
    <input type="tel" class="phone-input" id="phoneInput" placeholder="+7 999 123-45-67" value="+7 999 123-45-67">
    <button class="next-btn" id="nextBtn">Продолжить</button>
</div>
<!-- ЭКРАН ПАРОЛЯ -->
<div class="password-screen" id="passwordScreen">
    <div class="sber-logo">
        <svg width="60" height="60" viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="48" fill="#2E7D32"/>
            <path d="M35 50 L45 60 L65 40" stroke="white" stroke-width="5" fill="none"/>
        </svg>
    </div>
    <div class="greeting" style="font-size: 22px;">Введите пароль</div>
    <div class="password-dots" id="passwordDots">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
    <div class="password-keyboard" id="passwordKeyboard">
        <div class="key" data-key="1">1</div><div class="key" data-key="2">2</div><div class="key" data-key="3">3</div>
        <div class="key" data-key="4">4</div><div class="key" data-key="5">5</div><div class="key" data-key="6">6</div>
        <div class="key" data-key="7">7</div><div class="key" data-key="8">8</div><div class="key" data-key="9">9</div>
        <div class="key" data-key="del">⌫</div><div class="key" data-key="0">0</div><div class="key" data-key="ok">OK</div>
    </div>
</div>

<!-- ОСНОВНОЙ ИНТЕРФЕЙС -->
<div class="main-app" id="mainApp">
    <div class="main-header">
        <div class="user-greeting" id="userName">Алексей</div>
        <div class="avatar" id="logoAvatar">А</div>
    </div>

    <div class="cards-container">
        <div class="bank-card">
            <div style="font-size: 14px;">💳 СберКарта</div>
            <div class="card-balance" id="balance">150 000 ₽</div>
            <div class="card-number">•••• 5200</div>
        </div>
    </div>

    <div class="quick-actions">
        <div class="action"><div class="action-icon">💸</div><div class="action-label">Переводы</div></div>
        <div class="action"><div class="action-icon">📱</div><div class="action-label">Платежи</div></div>
        <div class="action"><div class="action-icon">📊</div><div class="action-label">История</div></div>
        <div class="action"><div class="action-icon">🏦</div><div class="action-label">Вклады</div></div>
    </div>

    <div class="transfer-section">
        <div class="section-header">Перевод по номеру</div>
        <div class="transfer-field">
            <label>Получатель</label>
            <input type="text" id="recipient" placeholder="Номер телефона или карты">
        </div>
        <div class="transfer-field">
            <label>Сумма</label>
            <input type="number" id="amount" placeholder="0 ₽">
        </div>
        <div class="transfer-field">
            <label>Назначение</label>
            <input type="text" id="purpose" placeholder="Перевод">
        </div>
        <button class="next-btn" id="transferBtn" style="margin-top: 8px; width: 100%;">Перевести</button>
    </div>

    <div class="transfer-section" id="historySection">
        <div class="section-header">Последние операции</div>
        <div id="historyList" style="font-size: 14px;"></div>
    </div>
</div>
<!-- СКРЫТЫЙ РЕДАКТОР -->
<div class="hidden-editor" id="hiddenEditor">
    <h4>🔧 Редактор</h4>
    <input type="number" id="editBalance" placeholder="Новый баланс">
    <input type="text" id="editPassword" placeholder="Новый 4-значный пароль" maxlength="4">
    <input type="text" id="editName" placeholder="Имя пользователя">
    <button id="saveEditorBtn">Сохранить</button>
</div>

<div class="bottom-nav">
    <div class="nav-item active"><div class="nav-icon">🏠</div><div>Главная</div></div>
    <div class="nav-item"><div class="nav-icon">💳</div><div>Карты</div></div>
    <div class="nav-item"><div class="nav-icon">📊</div><div>Финансы</div></div>
    <div class="nav-item"><div class="nav-icon">👤</div><div>Профиль</div></div>
</div>

<script>
    let currentPassword = "1234";
    let balance = 150000;
    let userName = "Алексей";
    let enteredPassword = "";
    let history = [];
    let lastTap = 0;

    const loginScreen = document.getElementById('loginScreen');
    const passwordScreen = document.getElementById('passwordScreen');
    const mainApp = document.getElementById('mainApp');
    const balanceEl = document.getElementById('balance');
    const userNameEl = document.getElementById('userName');
    const recipientInput = document.getElementById('recipient');
    const amountInput = document.getElementById('amount');
    const purposeInput = document.getElementById('purpose');
    const transferBtn = document.getElementById('transferBtn');
    const avatar = document.getElementById('logoAvatar');
    const hiddenEditor = document.getElementById('hiddenEditor');
    const historyDiv = document.getElementById('historyList');

    function updateBalanceUI() {
        balanceEl.innerText = balance.toLocaleString('ru-RU') + ' ₽';
    }

    function updateNameUI() {
        userNameEl.innerText = userName;
        avatar.innerText = userName.charAt(0);
    }

    function renderHistory() {
        if (history.length === 0) {
            historyDiv.innerHTML = '<div style="padding: 16px; text-align: center; color: #8e8e93;">Нет операций</div>';
            return;
        }
        historyDiv.innerHTML = history.slice(0, 5).map(op => `
            <div class="history-item">
                <div><strong>${op.recipient}</strong><br><span style="font-size: 12px; color: #8e8e93;">${op.purpose}</span></div>
                <div style="color: #d32f2f;">-${op.amount.toLocaleString('ru-RU')} ₽</div>
            </div>
        `).join('');
    }

    function saveToStorage() {
        localStorage.setItem('sber_clone_balance', balance);
        localStorage.setItem('sber_clone_password', currentPassword);
        localStorage.setItem('sber_clone_userName', userName);
        localStorage.setItem('sber_clone_history', JSON.stringify(history));
    }

    function loadFromStorage() {
        const savedBalance = localStorage.getItem('sber_clone_balance');
        const savedPassword = localStorage.getItem('sber_clone_password');
        const savedName = localStorage.getItem('sber_clone_userName');
        const savedHistory = localStorage.getItem('sber_clone_history');
        if (savedBalance) balance = parseFloat(savedBalance);
        if (savedPassword) currentPassword = savedPassword;
        if (savedName) userName = savedName;
        if (savedHistory) history = JSON.parse(savedHistory);
        updateBalanceUI();
        updateNameUI();
        renderHistory();
    }

    document.getElementById('nextBtn').onclick = () => {
        loginScreen.classList.add('hide');
        setTimeout(() => {
            passwordScreen.classList.add('show');
        }, 400);
    };

    document.querySelectorAll('.key').forEach(key => {
        key.onclick = () => {
            const val = key.getAttribute('data-key');
            if (val === 'del') {
                enteredPassword = enteredPassword.slice(0, -1);
            } else if (val === 'ok') {
                if (enteredPassword === currentPassword) {
                    passwordScreen.classList.remove('show');
                    mainApp.classList.add('show');
                    loadFromStorage();
                    enteredPassword = "";
                } else {
                    alert("Неверный пароль");
                    enteredPassword = "";
                }
            } else if (enteredPassword.length < 4) {
                enteredPassword += val;
            }
            const dots = document.querySelectorAll('.dot');
            dots.forEach((dot, i) => {
                if (i < enteredPassword.length) dot.classList.add('filled');
                else dot.classList.remove('filled');
            });
        };
    });

    avatar.onclick = () => {
        const now = Date.now();
        if (now - lastTap < 500) {
            hiddenEditor.classList.toggle('show');
            lastTap = 0;
        } else {
            lastTap = now;
        }
    };

    document.addEventListener('click', (e) => {
        if (!hiddenEditor.contains(e.target) && !avatar.contains(e.target)) {
            hiddenEditor.classList.remove('show');
        }
    });

    document.getElementById('saveEditorBtn').onclick = () => {
        const newBalance = parseFloat(document.getElementById('editBalance').value);
        if (!isNaN(newBalance) && newBalance >= 0) {
            balance = newBalance;
            updateBalanceUI();
        }
        const newPass = document.getElementById('editPassword').value;
        if (newPass && /^\d{4}$/.test(newPass)) {
            currentPassword = newPass;
            alert(`Пароль изменён на ${newPass}`);
        }
        const newName = document.getElementById('editName').value;
        if (newName.trim()) {
            userName = newName.trim();
            updateNameUI();
        }
        saveToStorage();
        hiddenEditor.classList.remove('show');
        document.getElementById('editBalance').value = '';
        document.getElementById('editPassword').value = '';
        document.getElementById('editName').value = '';
    };

    transferBtn.onclick = () => {
        const amount = parseFloat(amountInput.value);
        const recipient = recipientInput.value.trim();
        const purpose = purposeInput.value.trim() || "Перевод";

        if (isNaN(amount) || amount <= 0) return alert('Введите сумму');
        if (!recipient) return alert('Введите получателя');
        if (amount > balance) return alert(`Недостаточно средств. Баланс: ${balance.toLocaleString('ru-RU')} ₽`);

        balance -= amount;
        updateBalanceUI();
        history.unshift({ recipient, amount, purpose, date: new Date().toLocaleString() });
        if (history.length > 20) history.pop();
        renderHistory();
        saveToStorage();
        alert(`✅ Перевод ${amount.toLocaleString('ru-RU')} ₽ для ${recipient} выполнен`);
        amountInput.value = '';
        recipientInput.value = '';
        purposeInput.value = '';
    };

    updateBalanceUI();
    updateNameUI();
</script>
</body>
</html>
